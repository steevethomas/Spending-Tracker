<!DOCTYPE html>
<html>
<head>
<title>Expense Tracker</title>

<style>

body{
font-family:Arial;
background:#f0f4f8;
text-align:center;
margin:0;
padding:20px;
}

.container{
max-width:400px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

h1{
color:#2563eb;
}

input,select,button{
width:100%;
padding:10px;
margin-top:10px;
font-size:16px;
}

button{
background:#2563eb;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

ul{
list-style:none;
padding:0;
}

li{
background:#e2e8f0;
margin-top:5px;
padding:10px;
border-radius:5px;
}

.total{
margin-top:20px;
font-size:20px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>Daily Expense Tracker</h1>

<input type="text" id="name" placeholder="Expense Name">

<input type="number" id="amount" placeholder="Amount">

<select id="category">
<option>Food</option>
<option>Transport</option>
<option>Shopping</option>
<option>Subscription</option>
<option>Entertainment</option>
<option>Bills</option>
<option>Other</option>
</select>

<button onclick="addExpense()">Add Expense</button>

<ul id="list"></ul>

<div class="total">
Total: ₹<span id="total">0</span>
</div>

</div>

<script>

let total=0;

function addExpense(){

let name=document.getElementById("name").value;
let amount=document.getElementById("amount").value;
let category=document.getElementById("category").value;

if(name=="" || amount==""){
alert("Enter details");
return;
}

let li=document.createElement("li");

li.innerHTML=name+" - ₹"+amount+" ("+category+")";

document.getElementById("list").appendChild(li);

total=total+Number(amount);

document.getElementById("total").innerHTML=total;

document.getElementById("name").value="";
document.getElementById("amount").value="";
}

</script>

</body>
</html>
